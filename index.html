<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franti Trello Master</title>
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        .kanban-column { min-height: 150px; }
        .sortable-ghost { opacity: 0.3; background: #94a3b8; border-radius: 12px; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .modal-bg { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(4px); }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <!-- 1. PANTALLA DE LOGIN -->
    <div id="login-screen" class="flex items-center justify-center h-screen">
        <div class="bg-white p-8 rounded-3xl shadow-2xl text-black w-full max-w-sm mx-4 text-center">
            <h2 class="text-3xl font-black mb-6 tracking-tight text-slate-800">🔒 Acceso Privado</h2>
            <div class="space-y-3">
                <input type="text" id="user-input" placeholder="Usuario" class="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none transition">
                <input type="password" id="pass-input" placeholder="Contraseña" class="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none transition">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-6 hover:bg-blue-700 transition transform active:scale-95 shadow-lg">ENTRAR</button>
            <p id="login-error" class="text-red-500 mt-4 hidden font-bold text-sm italic">Credenciales incorrectas</p>
        </div>
    </div>

    <!-- 2. DASHBOARD (LISTA DE TABLEROS) -->
    <div id="dashboard" class="hidden p-6 md:p-12 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black text-blue-400 tracking-tighter">Mis Proyectos</h1>
            <button onclick="location.reload()" class="bg-slate-800 px-4 py-2 rounded-lg text-xs font-bold border border-slate-700 hover:bg-slate-700 transition">SALIR</button>
        </div>
        <div id="boards-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
            <!-- Los tableros aparecerán aquí -->
        </div>
        <button onclick="addBoardWizard()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl font-black shadow-xl transition-all transform hover:-translate-y-1">
            + NUEVO TABLERO
        </button>
    </div>

    <!-- 3. VISTA DEL TABLERO SELECCIONADO -->
    <div id="board-view" class="hidden h-screen flex flex-col">
        <div class="p-6 bg-slate-900/50 backdrop-blur flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-800">
            <div class="flex items-center gap-4">
                <button onclick="showDashboard()" class="text-blue-400 font-bold hover:text-blue-300 transition">← VOLVER</button>
                <h2 id="board-title" class="text-2xl font-black tracking-tight"></h2>
            </div>
            <button onclick="openBoardSettings()" class="bg-slate-700 hover:bg-slate-600 px-5 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition border border-slate-600">
                ⚙️ CONFIGURAR COLUMNAS
            </button>
        </div>
        <div id="columns-wrapper" class="flex gap-6 overflow-x-auto p-6 items-start flex-1">
            <!-- Columnas dinámicas -->
        </div>
    </div>

    <!-- 4. MODAL CONFIGURACIÓN TABLERO / COLUMNAS -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg">
        <div class="bg-white text-slate-900 w-full max-w-lg rounded-3xl p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black">Configurar Tablero</h3>
                <button onclick="closeSettings()" class="text-slate-400 hover:text-red-500 transition text-2xl">✕</button>
            </div>
            <div class="mb-6">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Nombre del Tablero</label>
                <input type="text" id="edit-board-name" class="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none font-bold text-lg">
            </div>
            <div class="mb-6">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3">Gestión de Columnas</label>
                <div id="edit-columns-list" class="space-y-3"></div>
                <button onclick="addColumnToEdit()" class="mt-4 text-blue-600 font-black text-sm hover:underline">+ Añadir nueva columna</button>
            </div>
            <button onclick="saveBoardSettings()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 transition shadow-lg">GUARDAR CONFIGURACIÓN</button>
        </div>
    </div>

    <!-- 5. MODAL EDICIÓN DE TARJETA -->
    <div id="card-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg">
        <div class="bg-white text-slate-900 w-full max-w-xl rounded-3xl p-8 relative shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black">Detalles de Tarea</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition text-2xl">✕</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Título</label>
                    <input type="text" id="modal-title" class="w-full border-2 p-3 rounded-xl font-bold outline-none focus:border-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Fecha Entrega</label>
                        <input type="text" id="modal-date" placeholder="Ej: 15 Abril" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Color Etiqueta</label>
                        <select id="modal-color" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500">
                            <option value="#3b82f6">Azul</option>
                            <option value="#ef4444">Rojo</option>
                            <option value="#22c55e">Verde</option>
                            <option value="#f59e0b">Naranja</option>
                            <option value="#a855f7">Morado</option>
                            <option value="#64748b">Gris</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Descripción Larga</label>
                    <textarea id="modal-desc" rows="4" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500 text-sm" placeholder="Añade aquí todos los detalles..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Objetivo</label>
                        <input type="text" id="modal-target" placeholder="Ej: 500" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Dato Actual</label>
                        <input type="text" id="modal-current" placeholder="Ej: 120" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500">
                    </div>
                </div>
                <div class="flex gap-3 pt-6">
                    <button onclick="saveCardChanges()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 transition">GUARDAR</button>
                    <button onclick="confirmDeleteCard()" class="bg-red-50 text-red-600 px-6 rounded-2xl font-bold hover:bg-red-100 transition">BORRAR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- LÓGICA DE LA APLICACIÓN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, where, doc, updateDoc, deleteDoc, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN DE TU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDxnZhGyE3hTNg8mBO_srMYtMDeBvZCBNw",
            authDomain: "mitrello-18bbf.firebaseapp.com",
            projectId: "mitrello-18bbf",
            storageBucket: "mitrello-18bbf.firebasestorage.app",
            messagingSenderId: "546412561982",
            appId: "1:546412561982:web:242b012d3168ec7f1c736f",
            measurementId: "G-38N8ESQPSY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentBoardId = null;
        let currentEditingCardId = null;
        let tempEditColumns = [];

        // CONTROL DE ACCESO
        window.handleLogin = () => {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;
            if(u === "Franti" && p === "Enero.20262026*") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadBoards();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        };

        // GESTIÓN DE TABLEROS
        async function loadBoards() {
            onSnapshot(collection(db, "boards"), (snap) => {
                const grid = document.getElementById('boards-grid');
                grid.innerHTML = "";
                snap.forEach(d => {
                    const b = d.data();
                    grid.innerHTML += `
                        <div class="group relative bg-slate-800 p-8 rounded-3xl border border-slate-700 hover:border-blue-500 transition cursor-pointer shadow-lg" onclick="openBoard('${d.id}')">
                            <h3 class="text-2xl font-black text-white">${b.name}</h3>
                            <p class="text-slate-500 text-[10px] mt-2 uppercase font-black tracking-tighter italic">${b.columns ? b.columns.length : 0} Columnas configuradas</p>
                            <button onclick="event.stopPropagation(); deleteBoard('${d.id}')" class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 p-2 bg-red-900/20 text-red-500 rounded-lg text-xs hover:bg-red-600 hover:text-white transition">🗑️</button>
                        </div>`;
                });
            });
        }

        window.addBoardWizard = async () => {
            const name = prompt("Nombre del Nuevo Tablero:");
            if(!name) return;
            // Columnas iniciales por defecto
            const cols = [{id: 'col_1', title: 'Pendiente'}, {id: 'col_2', title: 'En Proceso'}, {id: 'col_3', title: 'Completado'}];
            await addDoc(collection(db, "boards"), { name: name, columns: cols });
        };

        window.deleteBoard = async (id) => {
            if(confirm("¿Estás seguro? Se borrará el tablero y su configuración de columnas.")) {
                await deleteDoc(doc(db, "boards", id));
            }
        };

        // VISTA INTERNA DEL TABLERO
        window.openBoard = async (id) => {
            currentBoardId = id;
            const bDoc = await getDoc(doc(db, "boards", id));
            if (!bDoc.exists()) return;
            const bData = bDoc.data();
            
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('board-view').classList.remove('hidden');
            document.getElementById('board-title').innerText = bData.name;
            
            renderColumns(bData.columns || []);
            loadCards(id, bData.columns || []);
        };

        function renderColumns(cols) {
            const wrapper = document.getElementById('columns-wrapper');
            wrapper.innerHTML = "";
            cols.forEach(c => {
                wrapper.innerHTML += `
                    <div class="bg-slate-800/60 backdrop-blur p-4 rounded-2xl w-80 flex-shrink-0 border border-slate-700 shadow-xl">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black uppercase text-slate-400 text-[10px] tracking-widest truncate mr-4">${c.title}</h3>
                            <button onclick="showMassMoveMenu('${c.id}', '${c.title}')" class="text-[9px] font-black bg-slate-700 hover:bg-blue-600 px-2 py-1 rounded transition whitespace-nowrap">MOVER TODO</button>
                        </div>
                        <div class="kanban-column" id="${c.id}"></div>
                        <button onclick="addCard('${c.id}')" class="mt-4 w-full text-left text-slate-500 hover:text-blue-400 font-bold text-xs transition uppercase">+ Añadir tarjeta</button>
                    </div>`;
            });
        }

        // CONFIGURACIÓN DE COLUMNAS (MODAL)
        window.openBoardSettings = async () => {
            const bDoc = await getDoc(doc(db, "boards", currentBoardId));
            const bData = bDoc.data();
            document.getElementById('edit-board-name').value = bData.name;
            tempEditColumns = [...(bData.columns || [])];
            renderEditColumnsList();
            document.getElementById('settings-modal').classList.remove('hidden');
        };

        function renderEditColumnsList() {
            const list = document.getElementById('edit-columns-list');
            list.innerHTML = "";
            tempEditColumns.forEach((c, index) => {
                list.innerHTML += `
                    <div class="flex items-center gap-2">
                        <input type="text" value="${c.title}" onchange="updateTempColName(${index}, this.value)" class="flex-1 border-2 p-2 rounded-lg text-sm font-bold">
                        <button onclick="removeTempCol(${index})" class="text-red-500 p-2 hover:bg-red-50 rounded">🗑️</button>
                    </div>`;
            });
        }

        window.updateTempColName = (index, val) => { tempEditColumns[index].title = val; };
        window.addColumnToEdit = () => {
            tempEditColumns.push({ id: 'col_' + Date.now(), title: 'Nueva Columna' });
            renderEditColumnsList();
        };
        window.removeTempCol = (index) => {
            if(confirm("Si borras la columna, las tarjetas que hay en ella se moverán automáticamente a la primera columna disponible.")) {
                tempEditColumns.splice(index, 1);
                renderEditColumnsList();
            }
        };

        window.saveBoardSettings = async () => {
            const newName = document.getElementById('edit-board-name').value;
            await updateDoc(doc(db, "boards", currentBoardId), {
                name: newName,
                columns: tempEditColumns
            });
            closeSettings();
            openBoard(currentBoardId);
        };

        window.closeSettings = () => document.getElementById('settings-modal').classList.add('hidden');

        // GESTIÓN DE TARJETAS
        function loadCards(boardId, activeCols) {
            const q = query(collection(db, "cards"), where("boardId", "==", boardId));
            onSnapshot(q, async (snapshot) => {
                document.querySelectorAll('.kanban-column').forEach(c => c.innerHTML = "");
                const colIds = activeCols.map(c => c.id);

                snapshot.forEach(d => {
                    const c = d.data();
                    
                    // Recuperación de tarjetas huérfanas
                    if (!colIds.includes(c.status) && colIds.length > 0) {
                        updateDoc(doc(db, "cards", d.id), { status: colIds[0] });
                        return;
                    }

                    const html = `
                        <div id="${d.id}" onclick="openCardEditor('${d.id}')" class="bg-white p-4 rounded-xl mb-3 card-shadow border-l-[6px] cursor-pointer transform active:scale-95 transition" style="border-color: ${c.color || '#3b82f6'}">
                            <h4 class="text-slate-900 font-black leading-tight mb-2 text-sm">${c.title}</h4>
                            <div class="flex justify-between items-center text-[9px] font-black uppercase text-slate-400">
                                <span class="bg-slate-50 px-1 rounded">${c.date || 'S/F'}</span>
                                ${c.target ? `<span class="text-blue-600 font-bold">${c.current || 0} / ${c.target}</span>` : ''}
                            </div>
                        </div>`;
                    
                    const colDiv = document.getElementById(c.status);
                    if(colDiv) colDiv.innerHTML += html;
                });
                initSortable();
            });
        }

        window.addCard = async (status) => {
            const t = prompt("Título de la tarea:");
            if(t) await addDoc(collection(db, "cards"), { 
                boardId: currentBoardId, 
                title: t, 
                status: status, 
                color: "#3b82f6", 
                date: "", 
                description: "", 
                target: "", 
                current: "" 
            });
        };

        window.openCardEditor = async (id) => {
            currentEditingCardId = id;
            const d = await getDoc(doc(db, "cards", id));
            const c = d.data();
            document.getElementById('modal-title').value = c.title || "";
            document.getElementById('modal-date').value = c.date || "";
            document.getElementById('modal-color').value = c.color || "#3b82f6";
            document.getElementById('modal-desc').value = c.description || "";
            document.getElementById('modal-target').value = c.target || "";
            document.getElementById('modal-current').value = c.current || "";
            document.getElementById('card-modal').classList.remove('hidden');
        };

        window.saveCardChanges = async () => {
            await updateDoc(doc(db, "cards", currentEditingCardId), {
                title: document.getElementById('modal-title').value,
                date: document.getElementById('modal-date').value,
                color: document.getElementById('modal-color').value,
                description: document.getElementById('modal-desc').value,
                target: document.getElementById('modal-target').value,
                current: document.getElementById('modal-current').value
            });
            closeModal();
        };

        window.confirmDeleteCard = async () => {
            if(confirm("¿Borrar definitivamente esta tarjeta?")) {
                await deleteDoc(doc(db, "cards", currentEditingCardId));
                closeModal();
            }
        };

        window.closeModal = () => document.getElementById('card-modal').classList.add('hidden');
        window.showDashboard = () => {
            document.getElementById('board-view').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        };

        // ACCIONES MASIVAS
        window.showMassMoveMenu = async (fromId, fromName) => {
            const bDoc = await getDoc(doc(db, "boards", currentBoardId));
            const cols = bDoc.data().columns;
            const targets = cols.filter(c => c.id !== fromId);
            
            if(targets.length === 0) return alert("No hay otras columnas a donde mover.");

            let msg = `Mover todo de "${fromName}" a:\n\n`;
            targets.forEach((t, i) => msg += `${i+1}. ${t.title}\n`);
            const choice = prompt(msg + "\nEscribe el número de la columna destino:");
            
            if(targets[choice-1]) moveAll(fromId, targets[choice-1].id);
        };

        async function moveAll(fromId, toId) {
            const q = query(collection(db, "cards"), where("boardId", "==", currentBoardId), where("status", "==", fromId));
            const snap = await getDocs(q);
            const batch = writeBatch(db);
            snap.forEach(d => batch.update(doc(db, "cards", d.id), { status: toId }));
            await batch.commit();
        }

        // DRAG AND DROP (SORTABLE)
        function initSortable() {
            document.querySelectorAll('.kanban-column').forEach(el => {
                new Sortable(el, {
                    group: 'shared',
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    onEnd: async (e) => {
                        const cardId = e.item.id;
                        const newStatus = e.to.id;
                        await updateDoc(doc(db, "cards", cardId), { status: newStatus });
                    }
                });
            });
        }
    </script>
</body>
</html>
