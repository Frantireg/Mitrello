<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franti Pro Trello</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        .kanban-column { min-height: 150px; }
        .sortable-ghost { opacity: 0.3; background: #94a3b8; border-radius: 12px; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        body.modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <!-- LOGIN -->
    <div id="login-screen" class="flex items-center justify-center h-screen">
        <div class="bg-white p-8 rounded-3xl shadow-2xl text-black w-full max-w-sm mx-4">
            <h2 class="text-3xl font-black mb-6 text-center">🔒 Acceso</h2>
            <input type="text" id="user-input" placeholder="Usuario" class="w-full border-2 p-3 mb-3 rounded-xl focus:border-blue-500 outline-none">
            <input type="password" id="pass-input" placeholder="Contraseña" class="w-full border-2 p-3 mb-6 rounded-xl focus:border-blue-500 outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition">ENTRAR</button>
            <p id="login-error" class="text-red-500 mt-4 text-center hidden font-bold">Credenciales incorrectas</p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden p-6 md:p-12">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black text-blue-400">Mis Proyectos</h1>
            <button onclick="location.reload()" class="bg-slate-800 px-4 py-2 rounded-lg text-xs font-bold border border-slate-700">SALIR</button>
        </div>
        <div id="boards-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10"></div>
        <button onclick="addBoardWizard()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl font-black shadow-xl transition-all">+ NUEVO TABLERO PERSONALIZADO</button>
    </div>

    <!-- BOARD VIEW -->
    <div id="board-view" class="hidden p-4 md:p-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <button onclick="showDashboard()" class="text-blue-400 font-bold flex items-center gap-2">← VOLVER</button>
            <h2 id="board-title" class="text-3xl font-black text-center md:text-left"></h2>
            <div id="mass-actions" class="hidden"></div>
        </div>

        <div id="columns-wrapper" class="flex gap-6 overflow-x-auto pb-10 items-start">
            <!-- Columnas dinámicas aquí -->
        </div>
    </div>

    <!-- MODAL EDICIÓN TARJETA -->
    <div id="card-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white text-slate-900 w-full max-w-xl rounded-3xl p-8 relative shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 class="text-2xl font-black mb-6">Detalles de Tarjeta</h3>
            <div class="space-y-4">
                <input type="text" id="modal-title" placeholder="Título" class="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none font-bold">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="modal-date" placeholder="Fecha (ej: 20 Mar)" class="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none">
                    <select id="modal-color" class="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none text-sm">
                        <option value="#3b82f6">Azul</option>
                        <option value="#ef4444">Rojo</option>
                        <option value="#22c55e">Verde</option>
                        <option value="#f59e0b">Naranja</option>
                        <option value="#a855f7">Morado</option>
                    </select>
                </div>
                <textarea id="modal-desc" rows="4" class="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none" placeholder="Descripción..."></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="modal-target" class="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none" placeholder="Objetivo">
                    <input type="text" id="modal-current" class="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none" placeholder="Actual">
                </div>
                <div class="flex gap-3 pt-6">
                    <button onclick="saveCardChanges()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black">GUARDAR</button>
                    <button onclick="confirmDeleteCard()" class="bg-red-100 text-red-600 px-6 rounded-2xl font-bold">BORRAR</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, where, doc, updateDoc, deleteDoc, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- PEGA TUS CLAVES AQUÍ ---
        const firebaseConfig = {
            apiKey: "AIzaSyDxnZhGyE3hTNg8mBO_srMYtMDeBvZCBNw",
            authDomain: "mitrello-18bbf.firebaseapp.com",
            projectId: "mitrello-18bbf",
            storageBucket: "mitrello-18bbf.firebasestorage.app",
            messagingSenderId: "546412561982",
            appId: "1:546412561982:web:242b012d3168ec7f1c736f",
            measurementId: "G-38N8ESQPSY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentBoardId = null;
        let currentEditingCardId = null;
        let boardColumns = [];

        window.handleLogin = () => {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;
            if(u === "Franti" && p === "Enero.20262026*") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadBoards();
            } else { document.getElementById('login-error').classList.remove('hidden'); }
        };

        // --- ASISTENTE DE CREACIÓN DE TABLERO ---
        window.addBoardWizard = async () => {
            const name = prompt("Nombre del Tablero:");
            if(!name) return;
            const num = parseInt(prompt("¿Cuántas columnas quieres? (Ej: 3)"));
            if(isNaN(num) || num < 1) return;
            
            let cols = [];
            for(let i=0; i<num; i++) {
                const colName = prompt(`Nombre de la columna ${i+1}:`);
                cols.push({ id: `col_${Date.now()}_${i}`, title: colName || `Columna ${i+1}` });
            }
            await addDoc(collection(db, "boards"), { name: name, columns: cols });
        };

        async function loadBoards() {
            onSnapshot(collection(db, "boards"), (snap) => {
                const grid = document.getElementById('boards-grid');
                grid.innerHTML = "";
                snap.forEach(d => {
                    const b = d.data();
                    grid.innerHTML += `
                        <div class="group relative bg-slate-800 p-8 rounded-3xl border border-slate-700 hover:border-blue-500 transition cursor-pointer">
                            <div onclick="openBoard('${d.id}')">
                                <h3 class="text-2xl font-black">${b.name}</h3>
                                <p class="text-slate-500 text-xs mt-2 uppercase font-bold">${b.columns ? b.columns.length : 0} Columnas</p>
                            </div>
                            <button onclick="deleteBoard('${d.id}')" class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 p-2 bg-red-900/50 rounded-lg text-xs">🗑️</button>
                        </div>`;
                });
            });
        }

        window.deleteBoard = async (id) => { if(confirm("¿Borrar tablero?")) await deleteDoc(doc(db, "boards", id)); };

        // --- MANEJO DE TABLERO Y COLUMNAS ---
        window.openBoard = async (id) => {
            currentBoardId = id;
            const bDoc = await getDoc(doc(db, "boards", id));
            const bData = bDoc.data();
            boardColumns = bData.columns || [{id: 'pendiente', title: 'Pendiente'}, {id: 'proceso', title: 'Proceso'}, {id: 'completado', title: 'Completado'}];
            
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('board-view').classList.remove('hidden');
            document.getElementById('board-title').innerText = bData.name;
            
            renderColumns(boardColumns);
            loadCards(id);
        };

        function renderColumns(cols) {
            const wrapper = document.getElementById('columns-wrapper');
            wrapper.innerHTML = "";
            cols.forEach(c => {
                wrapper.innerHTML += `
                    <div class="bg-slate-800/60 backdrop-blur p-4 rounded-2xl w-80 flex-shrink-0 border border-slate-700">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black uppercase text-slate-400 text-[10px] tracking-widest">${c.title}</h3>
                            <button onclick="showMassMoveMenu('${c.id}', '${c.title}')" class="text-slate-500 hover:text-white text-xs font-bold bg-slate-700 px-2 py-1 rounded">MOVER TODO</button>
                        </div>
                        <div class="kanban-column" id="${c.id}"></div>
                        <button onclick="addCard('${c.id}')" class="mt-4 w-full text-left text-slate-500 hover:text-blue-400 font-bold text-sm">+ Añadir tarjeta</button>
                    </div>`;
            });
        }

        // --- MOVIMIENTO MASIVO ---
        window.showMassMoveMenu = (fromId, fromName) => {
            const targets = boardColumns.filter(c => c.id !== fromId);
            if(targets.length === 0) return alert("No hay otras columnas a donde mover.");
            
            let msg = `Mover todas las tarjetas de "${fromName}" a:\n\n`;
            targets.forEach((t, index) => msg += `${index + 1}. ${t.title}\n`);
            
            const choice = prompt(msg + "\nEscribe el número de la columna destino:");
            const selected = targets[parseInt(choice) - 1];
            
            if(selected) moveAllCards(fromId, selected.id);
        };

        async function moveAllCards(fromId, toId) {
            const q = query(collection(db, "cards"), where("boardId", "==", currentBoardId), where("status", "==", fromId));
            const snap = await getDocs(q);
            const batch = writeBatch(db);
            snap.forEach(d => batch.update(doc(db, "cards", d.id), { status: toId }));
            await batch.commit();
        }

        // --- TARJETAS ---
        function loadCards(boardId) {
            const q = query(collection(db, "cards"), where("boardId", "==", boardId));
            onSnapshot(q, (snapshot) => {
                document.querySelectorAll('.kanban-column').forEach(c => c.innerHTML = "");
                snapshot.forEach(d => {
                    const c = d.data();
                    const html = `
                        <div id="${d.id}" onclick="openCardEditor('${d.id}')" class="bg-white p-4 rounded-xl mb-3 shadow-lg border-l-8 cursor-pointer transform active:scale-95 transition" style="border-color: ${c.color}">
                            <h4 class="text-slate-900 font-black leading-tight mb-2">${c.title}</h4>
                            <div class="flex justify-between items-center">
                                <span class="text-[9px] font-black bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">${c.date || 'S/F'}</span>
                                ${c.target ? `<span class="text-[9px] font-bold text-blue-600">${c.current || 0}/${c.target}</span>` : ''}
                            </div>
                        </div>`;
                    const col = document.getElementById(c.status);
                    if(col) col.innerHTML += html;
                });
                initSortable();
            });
        }

        window.addCard = async (status) => {
            const t = prompt("Tarea:");
            if(t) await addDoc(collection(db, "cards"), { boardId: currentBoardId, title: t, status, color: "#3b82f6", date: "", description: "", target: "", current: "" });
        };

        window.openCardEditor = async (id) => {
            currentEditingCardId = id;
            const d = await getDoc(doc(db, "cards", id));
            const c = d.data();
            document.getElementById('modal-title').value = c.title;
            document.getElementById('modal-date').value = c.date;
            document.getElementById('modal-color').value = c.color;
            document.getElementById('modal-desc').value = c.description;
            document.getElementById('modal-target').value = c.target;
            document.getElementById('modal-current').value = c.current;
            document.getElementById('card-modal').classList.remove('hidden');
        };

        window.saveCardChanges = async () => {
            await updateDoc(doc(db, "cards", currentEditingCardId), {
                title: document.getElementById('modal-title').value,
                date: document.getElementById('modal-date').value,
                color: document.getElementById('modal-color').value,
                description: document.getElementById('modal-desc').value,
                target: document.getElementById('modal-target').value,
                current: document.getElementById('modal-current').value
            });
            closeModal();
        };

        window.confirmDeleteCard = async () => { if(confirm("¿Borrar?")) { await deleteDoc(doc(db, "cards", currentEditingCardId)); closeModal(); } };
        window.closeModal = () => document.getElementById('card-modal').classList.add('hidden');
        window.showDashboard = () => { document.getElementById('board-view').classList.add('hidden'); document.getElementById('dashboard').classList.remove('hidden'); };

        function initSortable() {
            document.querySelectorAll('.kanban-column').forEach(el => {
                new Sortable(el, { group: 'shared', animation: 150, ghostClass: 'sortable-ghost',
                    onEnd: async (e) => { await updateDoc(doc(db, "cards", e.item.id), { status: e.to.id }); }
                });
            });
        }
    </script>
</body>
</html>
